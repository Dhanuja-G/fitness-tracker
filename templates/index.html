<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Fitness Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Welcome Sudha 💜</h1>

<div class="cards">
    <div class="card">Total Calories<br><b>{{ total }}</b></div>
    <div class="card">This Month<br><b>{{ monthly }}</b></div>
    <div class="card">This Week<br><b>{{ weekly }}</b></div>
</div>

<h2>Add Workout</h2>

<form method="POST">
    <input type="text" name="exercise" placeholder="Exercise" required><br>
    <input type="number" name="duration" placeholder="Duration (minutes)" required><br>
    <input type="number" name="calories" placeholder="Calories" required><br>
    <input type="date" name="date" required><br>
    <button type="submit">Add Workout</button>
</form>

<h2>Your Workouts</h2>

<table border="1">
    <tr>
        <th>Exercise</th>
        <th>Duration</th>
        <th>Calories</th>
        <th>Date</th>
    </tr>
    {% for workout in workouts %}
    <tr>
        <td>{{ workout.exercise }}</td>
        <td>{{ workout.duration }}</td>
        <td>{{ workout.calories }}</td>
        <td>{{ workout.date }}</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
