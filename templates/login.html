<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
<div class="auth-nav">
    <div class="auth-brand">Fitness Tracker</div>
    <div class="auth-menu">
        <a href="/">REGISTER</a>
        <a href="/login">LOGIN</a>
    </div>
</div>

<div class="auth-landscape">
    <div class="bird bird-left"></div>
    <div class="bird bird-right"></div>
    <div class="mountain mountain-1"></div>
    <div class="mountain mountain-2"></div>
    <div class="mountain mountain-3"></div>
    <div class="mountain mountain-4"></div>
    <div class="mountain mountain-5"></div>
</div>

<div class="auth-stage">
    <div class="auth-card">
        <h2>LOGIN</h2>

        <form method="POST" class="auth-form">
            <div class="auth-field">
                <label for="email">Email</label>
                <input id="email" class="auth-line-input" type="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="auth-field">
                <label for="password">Password</label>
                <input id="password" class="auth-line-input" type="password" name="password" placeholder="Enter your password" required>
            </div>

            <div class="auth-meta">
                <label class="remember-row" for="remember">
                    <input id="remember" type="checkbox" name="remember">
                    <span>Remember Me</span>
                </label>
                <a href="#" class="auth-helper">Forgot <strong>Password?</strong></a>
            </div>

            <button type="submit" class="btn">Login</button>
        </form>

        <p class="auth-footer">
            <span>Don't have an Account?</span>
            <a href="/">Register</a>
        </p>
    </div>
</div>
</body>
</html>
